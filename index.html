<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST VOCACIONAL</title>
<link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<header>
    <img src="TecNM_logo.png" class="logo-izq">
    <div class="texto-header">
        <h2>SII SISTEMA INTEGRAL DE INFORMACIÓN</h2>
        <h1>TecNM CAMPUS ATITALAQUIA</h1>
    </div>
    <img src="imgEscudo.png" class="logo-der">
</header>

<div class="main">

  <!-- PANTALLA 1: Registro -->
  <div id="registro" class="card">
    <label>Nombre completo</label>
    <input type="text" id="nombre">
    <label>Edad</label>
    <input type="number" id="edad">
    <button onclick="iniciarTest()">Comenzar Test</button>
  </div>

  <!-- PANTALLA 2: Modalidad -->
  <div id="modalidad" style="display:none">
    <div class="card modalidad">
      <h2 class="tituloModalidad">Elige tu modalidad</h2>
      <button onclick="seleccionarModalidad('linea')">En línea</button>
      <button onclick="seleccionarModalidad('presencial')">Presencial</button>
    </div>
  </div>

  <!-- PANTALLA 3: Test -->
  <div id="test" style="display:none">
    <div class="card">
      <div class="barra">
        <div id="progreso"></div>
      </div>
      <div id="contenedorPreguntas"></div>
    </div>
  </div>

</div>

<script>
  var nombreAlumno = "";
  var preguntaActual = 0;
  var puntajes = [0, 0, 0, 0];

  var carreras = [
    {
      nombre: "Ingeniería Industrial",
      img: "industrial.jpg",
      desc: "Optimiza procesos productivos y mejora la eficiencia en empresas manufactureras y de servicios."
    },
    {
      nombre: "Ingeniería Química",
      img: "quimica.jpg",
      desc: "Diseña y opera procesos que transforman materias primas en productos útiles mediante reacciones químicas."
    },
    {
      nombre: "Ingeniería en Sistemas Computacionales",
      img: "sistemas.png",
      desc: "Desarrolla software, sistemas y soluciones tecnológicas para automatizar y mejorar procesos."
    },
    {
      nombre: "Administración",
      img: "administracion.png",
      desc: "Planifica, organiza y dirige recursos humanos y financieros para alcanzar los objetivos de una organización."
    }
  ];

  var preguntas = [
    {
      texto: "¿Qué actividad disfrutas más?",
      opciones: [
        { texto: "Organizar y mejorar procesos",      pts: [3, 0, 1, 2] },
        { texto: "Experimentos y laboratorio",         pts: [1, 3, 0, 0] },
        { texto: "Programar o usar computadoras",      pts: [0, 0, 3, 1] },
        { texto: "Liderar equipos y proyectos",        pts: [1, 0, 0, 3] }
      ]
    },
    {
      texto: "¿En qué área te imaginas trabajando?",
      opciones: [
        { texto: "Fábrica o planta de producción",    pts: [3, 1, 0, 0] },
        { texto: "Laboratorio de investigación",       pts: [0, 3, 0, 0] },
        { texto: "Empresa de tecnología",              pts: [0, 0, 3, 1] },
        { texto: "Empresa u oficina de negocios",      pts: [0, 0, 0, 3] }
      ]
    },
    {
      texto: "¿Qué materia te gusta más?",
      opciones: [
        { texto: "Matemáticas y física",               pts: [3, 2, 2, 0] },
        { texto: "Química y biología",                 pts: [1, 3, 0, 0] },
        { texto: "Computación",                        pts: [0, 0, 3, 1] },
        { texto: "Economía y contabilidad",            pts: [0, 0, 0, 3] }
      ]
    },
    {
      texto: "¿Qué problema te gustaría resolver?",
      opciones: [
        { texto: "Reducir desperdicios en una fábrica",       pts: [3, 0, 1, 1] },
        { texto: "Crear nuevos materiales o medicamentos",    pts: [0, 3, 0, 0] },
        { texto: "Desarrollar una aplicación o sistema",      pts: [0, 0, 3, 0] },
        { texto: "Mejorar las ventas de una empresa",         pts: [0, 0, 0, 3] }
      ]
    },
    {
      texto: "¿Cómo prefieres trabajar?",
      opciones: [
        { texto: "En planta, supervisando producción",        pts: [3, 1, 0, 0] },
        { texto: "Analizando muestras en laboratorio",        pts: [0, 3, 0, 0] },
        { texto: "Frente a la computadora programando",       pts: [0, 0, 3, 0] },
        { texto: "Tomando decisiones en equipo",              pts: [0, 0, 0, 3] }
      ]
    }
  ];

  function iniciarTest() {
    nombreAlumno = document.getElementById("nombre").value.trim();
    var edad = document.getElementById("edad").value.trim();
    if (nombreAlumno === "" || edad === "") {
      alert("Por favor completa tu nombre y edad.");
      return;
    }
    document.getElementById("registro").style.display = "none";
    document.getElementById("modalidad").style.display = "block";
  }

  function seleccionarModalidad(tipo) {
    document.getElementById("modalidad").style.display = "none";
    document.getElementById("test").style.display = "block";
    preguntaActual = 0;
    puntajes = [0, 0, 0, 0];
    mostrarPregunta();
  }

  function mostrarPregunta() {
    if (preguntaActual >= preguntas.length) {
      mostrarResultado();
      return;
    }
    var p = preguntas[preguntaActual];
    var porcentaje = Math.round((preguntaActual / preguntas.length) * 100);
    document.getElementById("progreso").style.width = porcentaje + "%";

    var html = "<h3>Pregunta " + (preguntaActual + 1) + " de " + preguntas.length + "</h3>";
    html += "<p>" + p.texto + "</p>";
    p.opciones.forEach(function(op, i) {
      html += '<button onclick="responder(' + i + ')">' + op.texto + '</button>';
    });
    document.getElementById("contenedorPreguntas").innerHTML = html;
  }

  function responder(indice) {
    var pts = preguntas[preguntaActual].opciones[indice].pts;
    for (var i = 0; i < 4; i++) {
      puntajes[i] += pts[i];
    }
    preguntaActual++;
    mostrarPregunta();
  }

  function mostrarResultado() {
    document.getElementById("progreso").style.width = "100%";
    var ranking = [0, 1, 2, 3].sort(function(a, b) {
      return puntajes[b] - puntajes[a];
    });
    var top1 = carreras[ranking[0]];
    var top2 = carreras[ranking[1]];
    var top3 = carreras[ranking[2]];

    var params = new URLSearchParams({
      nombre: nombreAlumno,
      c1: top1.nombre, img1: top1.img, d1: top1.desc,
      c2: top2.nombre, img2: top2.img, d2: top2.desc,
      c3: top3.nombre, img3: top3.img, d3: top3.desc
    });
    window.location.href = "resultado.html?" + params.toString();
  }
</script>

</body>
</html>
