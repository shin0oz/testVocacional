<!DOCTYPE html> 
<html> 
<head> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST VOCACIONAL</title> 
<meta charset="utf-8" />
<link rel="stylesheet" href="css/estilo.css" />
</head> 

<body>

<header>
    <img src="TecNM_logo.png" class="logo-izq">
    <div class="texto-header">
        <h2>SII SISTEMA INTEGRAL DE INFORMACIÓN</h2>
        <h1>TecNM CAMPUS ATITALAQUIA</h1>
    </div>
    <img src="imgEscudo.png" class="logo-der">
</header>

<div class="main">

<div id="registro" class="card">
<label>Nombre completo</label>
<input type="text" id="nombre">

<label>Edad</label>
<input type="number" id="edad">

<button onclick="iniciarTest()">Comenzar Test</button>
</div>

<div id="modalidad" style="display:none">
    <div class="card modalidad">
        <h2 class="tituloModalidad">Elige tu modalidad</h2>
        <button onclick="seleccionarModalidad('linea')">En línea</button>
        <button onclick="seleccionarModalidad('presencial')">Presencial</button>
    </div>
</div>

<div id="test" style="display:none ">
    <div class="card">
        <div class="barra">
            <div id="progreso"></div>
        </div>
        <div id="contenedorPreguntas"></div>
    </div>
</div>

<script>

let puntajes = {
    sistemas: 0,
    industrial: 0,
    gestion: 0,
    mecatronica: 0,
    quimica: 0,
    administracion: 0
};

let tipoModalidad = "";
let paso = 0;
let ordenPreguntas = [];

function mezclar(array){
    for(let i = array.length -1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function iniciarTest(){

let nombre=document.getElementById("nombre").value.trim();
let edad=document.getElementById("edad").value;

if(nombre==""){
alert("Escribe tu nombre completo");
return;
}

if(nombre.split(" ").length < 2){
alert("Debes escribir nombre y apellido");
return;
}

if(nombre===nombre.toUpperCase()){
alert("No escribas todo en mayúsculas");
return;
}

edad=parseInt(edad);

if(isNaN(edad) || edad<=17 || edad>45){
alert("Edad entre 18 y 45");
return;
}

document.getElementById("registro").style.display="none";
document.getElementById("modalidad").style.display="block";
}

function seleccionarModalidad(tipo){

tipoModalidad = tipo;

document.getElementById("modalidad").style.display="none";
document.getElementById("test").style.display="block";
document.querySelector(".barra").style.display="block";

paso = 0;

if(tipoModalidad=="linea"){
    ordenPreguntas = [0,1,2,3,4,5];
}else{
    ordenPreguntas = [0,1,2,3];
}

mezclar(ordenPreguntas);

mostrarPregunta();
}

function mostrarPregunta(){

let contenedor = document.getElementById("contenedorPreguntas");
contenedor.innerHTML = "";

let actual = ordenPreguntas[paso];
let pregunta = "";

if(tipoModalidad=="linea"){

if(actual==0){
pregunta="¿Te gusta usar computadoras frecuentemente?";
}
else if(actual==1){
pregunta="¿Te gusta resolver problemas usando lógica?";
}
else if(actual==2){
pregunta="¿Te gustaría crear programas o aplicaciones?";
}
else if(actual==3){
pregunta="¿Te gusta analizar y mejorar procesos paso a paso?";
}
else if(actual==4){
pregunta="¿Te gusta organizar actividades o planear cosas?";
}
else if(actual==5){
pregunta="¿Te gusta trabajar con números o analizar datos?";
}
else{
calcularResultado();
return;
}

}

else{

if(actual==0){
pregunta="¿Te interesa más la tecnología o los procesos físicos?";
}
else if(actual==1){
pregunta="¿Te gustaría programar o diseñar sistemas?";
}
else if(actual==2){
pregunta="¿Te interesa la electrónica o automatización?";
}
else if(actual==3){
pregunta="¿Te gusta trabajar en laboratorio o con químicos?";
}
else{
calcularResultado();
return;
}

}

contenedor.innerHTML = `
<div class="pregunta">
<p>${pregunta}</p>

<label class="opcion">
<input type="radio" name="resp" value="1"> Si
</label>

<label class="opcion">
<input type="radio" name="resp" value="0"> No
</label>
</div>

<button onclick="siguiente()">Siguiente</button>
`;

actualizarBarra();
}

function siguiente(){

let r=document.querySelector('input[name="resp"]:checked');

if(!r){
alert("Responde la pregunta");
return;
}

let valor = parseInt(r.value);
let actual = ordenPreguntas[paso];

if(tipoModalidad=="linea"){

if(actual==0 && valor==1) puntajes.sistemas += 2;
if(actual==1 && valor==1) puntajes.sistemas += 2;
if(actual==2 && valor==1) puntajes.sistemas += 3;

if(actual==3 && valor==1) puntajes.industrial += 3;
if(actual==4 && valor==1) puntajes.gestion += 3;

if(actual==5 && valor==1){
    puntajes.industrial += 2;
    puntajes.sistemas += 1;
}
}

else{

if(actual==0){
    if(valor==1) puntajes.sistemas += 1;
    else puntajes.industrial += 1;
}

if(actual==1){
    if(valor==1) puntajes.sistemas += 2;
    else puntajes.mecatronica += 1;
}

if(actual==2){
    if(valor==1) puntajes.mecatronica += 2;
    else puntajes.quimica += 2;
}

if(actual==3){
    if(valor==1) puntajes.quimica += 2;
    else puntajes.administracion += 2;
}
}

paso++;

if(paso >= ordenPreguntas.length){
    calcularResultado();
    return;
}

mostrarPregunta();
}

function actualizarBarra(){
let total = ordenPreguntas.length;
let porcentaje = (paso/total)*100;
document.getElementById("progreso").style.width = porcentaje+"%";
}

function calcularResultado(){

let lista = [
{nombre:"Ingenieria en Sistemas Computacionales", key:"sistemas", img:"sistemas.png", desc:"Tienes habilidades en lógica y programación."},
{nombre:"Ingenieria Industrial", key:"industrial", img:"industrial.jpg", desc:"Te gusta optimizar procesos."},
{nombre:"Ingenieria en Gestion Empresarial", key:"gestion", img:"gestion.jpg", desc:"Te gusta organizar actividades."},
{nombre:"Ingenieria Mecatronica", key:"mecatronica", img:"mecatronica.jpg", desc:"Te interesa la automatización."},
{nombre:"Ingenieria Quimica", key:"quimica", img:"quimica.jpg", desc:"Te interesan los procesos químicos."},
{nombre:"Ingenieria en Administracion", key:"administracion", img:"administracion.png", desc:"Te gusta gestionar proyectos."}
];

lista.sort((a,b)=> puntajes[b.key] - puntajes[a.key]);

let top1 = lista[0];
let top2 = lista[1];
let top3 = lista[2];

let nombre=document.getElementById("nombre").value;

window.location.href=`resultado.html?
nombre=${nombre}
&c1=${top1.nombre}&img1=${top1.img}&d1=${top1.desc}
&c2=${top2.nombre}&img2=${top2.img}&d2=${top2.desc}
&c3=${top3.nombre}&img3=${top3.img}&d3=${top3.desc}`;
}

</script>
</body> 
</html>
